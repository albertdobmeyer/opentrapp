<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0EA5E9" stop-opacity="0.35"/>
      <stop offset="60%" stop-color="#009966" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#009966" stop-opacity="0"/>
    </radialGradient>
    <pattern id="dots" x="0" y="0" width="32" height="32" patternUnits="userSpaceOnUse">
      <circle cx="16" cy="16" r="1" fill="#94a3b8" fill-opacity="0.10"/>
    </pattern>
  </defs>

  <rect width="1280" height="640" fill="url(#bg)"/>
  <rect width="1280" height="640" fill="url(#dots)"/>

  <!-- brand glow behind the banner -->
  <ellipse cx="640" cy="284" rx="520" ry="180" fill="url(#glow)"/>

  <!-- gradient banner (relative path; rendered at 880px wide, native aspect 2000:609) -->
  <image href="../img/logo-banner.png" x="200" y="150" width="880" height="268" preserveAspectRatio="xMidYMid meet"/>

  <!-- tagline -->
  <text x="640" y="490" font-family="Segoe UI, -apple-system, BlinkMacSystemFont, system-ui, sans-serif" font-size="30" fill="#cbd5e1" text-anchor="middle">A safer way to run OpenClaw on your own computer.</text>

  <!-- footer -->
  <text x="640" y="584" font-family="Consolas, 'JetBrains Mono', 'SF Mono', monospace" font-size="18" fill="#64748b" text-anchor="middle">albertdobmeyer  /  github.com/albertdobmeyer/lobster-trapp</text>
</svg>
