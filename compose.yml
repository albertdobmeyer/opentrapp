# OpenTrApp: unified perimeter compose
#
# Five-container security perimeter for an autonomous CLI agent
# (OpenClaw in the reference deployment; architecture is agent-agnostic).
# All untrusted content (agent runtime, skill files, social feeds) is
# processed inside containers, never on the host.
#
# Architecture (see docs/adr/0009-five-container-perimeter.md for the L7/L3 split):
#   vault-agent   — agent runtime containment
#   vault-forge   — supply-chain defense (skill scanner + CDR)
#   vault-pioneer — social-content analysis (parked since 2026-05-03)
#   vault-proxy   — L7 egress policy: API-key injection, domain allowlist, request logging
#   vault-egress  — L3 egress policy: kernel-level RFC1918 drop + pinned DoT resolver
#
# Network isolation:
#   vault-agent   ↔ vault-proxy   (agent-net, internal)
#   vault-forge   ↔ vault-proxy   (forge-net, internal)
#   vault-pioneer ↔ vault-proxy   (pioneer-net, internal)
#   vault-proxy   ↔ vault-egress  (egress-net, internal)
#   vault-egress  ↔ internet      (external-net, bridged)
#
#   Agent CANNOT reach forge / pioneer / external internet.
#   Proxy CANNOT reach the internet directly — only via vault-egress.
#   vault-egress is the ONLY container with internet, holds NET_ADMIN, holds NO secrets.
#
# Usage:
#   podman compose up -d          Start the perimeter
#   podman compose logs -f        Watch all containers
#   podman compose down           Graceful shutdown
#
# Requires: .env file with API keys (see components/opencli-container/.env.example)

services:
  # ─── THE CELL BLOCK ─────────────────────────────────────────────
  # OpenClaw agent runtime. Heavily restricted. No internet access.
  # API keys never enter this container — proxy injects them.
  vault-agent:
    build:
      context: ./components/opencli-container
      dockerfile: Containerfile
    read_only: true
    tmpfs:
      - /tmp:size=256m,noexec,nosuid,mode=1777
      - /home/vault/.config:size=64m,noexec,nosuid,mode=1777
      - /home/vault/workspace:size=1g,noexec,nosuid,mode=1777
    security_opt:
      - no-new-privileges:true
      - seccomp=/home/albertd/Repositories/opentrapp/components/opencli-container/config/vault-seccomp.json
    cap_drop:
      - ALL
    pids_limit: 256
    mem_limit: 4g
    cpus: 2
    networks:
      - agent-net
    depends_on:
      vault-proxy:
        condition: service_started
    volumes:
      - proxy-ca:/opt/proxy-ca:ro
      - vault-data:/home/vault/.openclaw
      # Skills delivered by forge — read-only from agent's perspective
      - forge-deliveries:/home/vault/workspace/skills:ro
    environment:
      - HTTP_PROXY=http://vault-proxy:8080
      - HTTPS_PROXY=http://vault-proxy:8080
      - NO_PROXY=localhost,127.0.0.1
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
    stdin_open: true
    tty: true
    restart: unless-stopped

  # ─── THE GATE (L7 policy) ───────────────────────────────────────
  # mitmproxy sidecar. Enforces application-layer policy: domain allowlist,
  # API-key injection, post-resolve destination-IP check (ADR-0009 Tier 2),
  # request logging, payload-size limits.
  #
  # Holds real API keys but NOT NET_ADMIN. Has no direct internet attachment —
  # outbound traffic is chained to vault-egress via --mode upstream which
  # enforces the L3 (kernel-level) policy. See ADR-0009 for the split rationale.
  vault-proxy:
    image: docker.io/mitmproxy/mitmproxy@sha256:89735e2280557aa7597db3a96edcddd5055a0e30d9db7dfb1bfe12c450c333f1
    command: >
      mitmdump
        --listen-host 0.0.0.0
        --listen-port 8080
        --mode upstream:http://vault-egress:8888
        --set block_global=false
        --set block_private=false
        --set connection_strategy=lazy
        --scripts /opt/vault/vault-proxy.py
    tmpfs:
      - /tmp:size=64m,noexec,nosuid
    security_opt:
      - seccomp=/home/albertd/Repositories/opentrapp/components/opencli-container/config/vault-proxy-seccomp.json
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
      - SETUID
      - SETGID
      # CHOWN + DAC_OVERRIDE needed by mitmproxy entrypoint to set up
      # the mitmproxy user and chown the home directory.
      # These are used only during startup, then dropped by gosu.
      - CHOWN
      - DAC_OVERRIDE
    mem_limit: 2g
    pids_limit: 128
    volumes:
      - ./components/opencli-container/proxy/vault-proxy.py:/opt/vault/vault-proxy.py:ro
      - ./components/opencli-container/proxy/allowlist.txt:/opt/vault/allowlist.txt:ro
      - vault-proxy-logs:/var/log/vault-proxy
      - proxy-ca:/home/mitmproxy/.mitmproxy
    networks:
      # ADR-0009 — vault-proxy LOSES external-net attachment. Internet
      # reachable only via vault-egress on egress-net.
      - agent-net
      - forge-net
      - pioneer-net
      - egress-net
    depends_on:
      vault-egress:
        condition: service_healthy
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_VERSION=${ANTHROPIC_API_VERSION:-2023-06-01}
    restart: unless-stopped

  # ─── THE FENCE (L3 policy) ──────────────────────────────────────
  # vault-egress is the ONLY container with public-internet attachment.
  # Holds NET_ADMIN, holds NO secrets, runs NO application code beyond the
  # kernel ruleset, the unbound pinned resolver, and the tinyproxy forwarder.
  # See ADR-0009 for the rationale and ADR-0010 for the resolver design.
  vault-egress:
    build:
      context: ./components/opencli-container/egress
      dockerfile: Containerfile
    read_only: true
    tmpfs:
      - /tmp:size=64m,noexec,nosuid
      - /run:size=8m,noexec,nosuid
      - /var/log/vault-egress:size=32m,nosuid
    volumes:
      # Pin /etc/resolv.conf to local unbound — see ADR-0010. The file is
      # baked into the egress/ directory and mounted read-only; tinyproxy's
      # libc resolver reads from it on every connect.
      - ./components/opencli-container/egress/resolv.conf:/etc/resolv.conf:ro
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      # The single container in the perimeter with elevated network capabilities.
      # Required for nftables rule installation and IP forwarding configuration.
      # NOT granted to any other container.
      - NET_ADMIN
      - NET_RAW
      # Required by tinyproxy to bind 0.0.0.0:8888 as nobody
      - NET_BIND_SERVICE
      # Required by entrypoint.sh /etc/resolv.conf rewrite
      - CHOWN
      - DAC_OVERRIDE
      # Required by tinyproxy and unbound to drop from root to nobody
      # (their built-in privilege-drop step). Both processes are started by
      # the entrypoint as root and immediately demote themselves.
      - SETUID
      - SETGID
    sysctls:
      # Enable IP forwarding declaratively. Required because the container's
      # /proc/sys is read-only under read_only:true, so the entrypoint cannot
      # `sysctl -w` at runtime.
      - net.ipv4.ip_forward=1
      - net.ipv6.conf.all.forwarding=1
    # Route the container's own DNS queries through unbound on 127.0.0.1:53.
    # The compose `dns:` directive is unreliable across runtimes (podman's
    # per-network DNS plugin overrides it) — bind-mounting a static resolv.conf
    # is the only path that works consistently. unbound itself talks to Quad9
    # and Cloudflare by direct IP, so this redirection is safe on boot.
    mem_limit: 256m
    pids_limit: 64
    cpus: 0.5
    networks:
      - egress-net
      - external-net
    healthcheck:
      test: ["CMD-SHELL", "nft list ruleset | grep -q vault_egress_drop_private && nc -z 127.0.0.1 8888"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  # ─── THE WORKSHOP ───────────────────────────────────────────────
  # Skill scanner & CDR pipeline. Downloads untrusted SKILL files
  # INTO this container, scans with 87 MITRE patterns, rebuilds
  # from scratch. Clean output delivered to agent via shared volume.
  # ISOLATED from agent — agent cannot tamper with inspection.
  vault-forge:
    build:
      context: ./components/openskill-forge
      dockerfile: Containerfile
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    mem_limit: 1g
    pids_limit: 128
    networks:
      - forge-net
    volumes:
      # Certified skills are written here — agent reads them (ro)
      - forge-deliveries:/app/exports
      # Trust the proxy's CA cert for HTTPS interception
      - proxy-ca:/opt/proxy-ca:ro
    environment:
      # Forge routes downloads through the proxy for allowlist enforcement
      - HTTP_PROXY=http://vault-proxy:8080
      - HTTPS_PROXY=http://vault-proxy:8080
      - NO_PROXY=localhost,127.0.0.1
      # Trust the mitmproxy CA cert so curl/python can verify HTTPS through the proxy
      - CURL_CA_BUNDLE=/opt/proxy-ca/mitmproxy-ca-cert.pem
      - REQUESTS_CA_BUNDLE=/opt/proxy-ca/mitmproxy-ca-cert.pem
      - SSL_CERT_FILE=/opt/proxy-ca/mitmproxy-ca-cert.pem
    # Forge is a task runner, not a daemon. It starts, runs a scan/CDR
    # pipeline when triggered, and can idle between tasks.
    # Keep alive so the orchestrator can exec commands into it.
    command: ["bash", "-c", "echo 'vault-forge ready' && sleep infinity"]
    restart: unless-stopped

  # ─── THE MONITORING STATION ─────────────────────────────────────
  # Feed scanner & injection pattern matcher. Processes untrusted
  # Moltbook content inside the container, never on the host.
  # Filters content before agent sees it.
  # ISOLATED from agent — agent cannot influence analysis.
  vault-pioneer:
    build:
      context: ./components/openagent-social
      dockerfile: Containerfile
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    mem_limit: 512m
    pids_limit: 64
    volumes:
      # Trust the proxy's CA cert for HTTPS interception
      - proxy-ca:/opt/proxy-ca:ro
    networks:
      - pioneer-net
    environment:
      # Pioneer routes API calls through the proxy
      - HTTP_PROXY=http://vault-proxy:8080
      - HTTPS_PROXY=http://vault-proxy:8080
      - NO_PROXY=localhost,127.0.0.1
      # Trust the mitmproxy CA cert
      - CURL_CA_BUNDLE=/opt/proxy-ca/mitmproxy-ca-cert.pem
      - REQUESTS_CA_BUNDLE=/opt/proxy-ca/mitmproxy-ca-cert.pem
      - SSL_CERT_FILE=/opt/proxy-ca/mitmproxy-ca-cert.pem
    # Pioneer is a task runner like forge. Idles between scans.
    command: ["bash", "-c", "echo 'vault-pioneer ready' && sleep infinity"]
    restart: unless-stopped

# ─── NETWORK ISOLATION ──────────────────────────────────────────
# Each component gets its own internal network with the proxy.
# No cross-talk: agent can't reach forge, forge can't reach pioneer, etc.
# Only the proxy bridges all networks + has internet access.
networks:
  agent-net:
    internal: true    # No default gateway — agent is trapped here
  forge-net:
    internal: true    # No default gateway — forge is trapped here
  pioneer-net:
    internal: true    # No default gateway — pioneer is trapped here
  # ADR-0009: egress-net bridges vault-proxy and vault-egress. Internal —
  # no host route — because vault-proxy must reach the internet ONLY by way
  # of vault-egress's tinyproxy at 8888. The subnet is fixed to 10.230.0.0/24
  # so the nftables MASQUERADE rule in components/opencli-container/egress/
  # nftables.conf can match by source address.
  egress-net:
    internal: true
    ipam:
      config:
        - subnet: 10.230.0.0/24
  external-net:
    # ADR-0009: now reachable ONLY from vault-egress. The only container
    # in the perimeter with public-internet attachment.
    driver: bridge

# ─── VOLUMES ────────────────────────────────────────────────────
volumes:
  vault-proxy-logs:
    driver: local
  proxy-ca:
    driver: local
  vault-data:
    driver: local
  # Forge writes certified skills here. Agent reads them.
  # This is the only data path between forge and agent —
  # no network connection, just a shared filesystem.
  forge-deliveries:
    driver: local
