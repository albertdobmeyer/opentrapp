# vault-egress unbound configuration — ADR-0010 Tier 5 (pinned resolver)
#
# Role: the only DNS resolver any container in the perimeter is allowed to
# use. Forwards queries over DNS-over-TLS (DoT) to Quad9 (primary, with
# malware blocking) and Cloudflare (secondary). Enforces a minimum cache
# TTL of 60 s to defeat DNS-rebinding attacks that rely on TTL=0.
#
# Listening on 127.0.0.1:53 (loopback only) — the local interface
# tinyproxy and vault-proxy share by way of the container's resolv.conf
# override in entrypoint.sh.

server:
    verbosity: 1
    interface: 127.0.0.1@53
    port: 53
    do-udp: yes
    do-tcp: yes
    do-ip4: yes
    do-ip6: no                  # external-net is IPv4 only by default
    access-control: 127.0.0.0/8 allow
    access-control: 0.0.0.0/0 refuse

    # Keep logs on stderr instead of switching to syslog (no syslog daemon
    # runs in this minimal container). Required for `podman logs vault-egress`
    # to see resolver errors.
    use-syslog: no
    logfile: ""

    # Don't be a recursive resolver — strictly forward upstream.
    # This is what makes it a *stub* resolver pinned to trusted upstreams.
    do-not-query-localhost: no
    harden-glue: yes
    harden-dnssec-stripped: yes
    harden-below-nxdomain: yes
    use-caps-for-id: yes

    # ── ADR-0010 cornerstone: minimum cache TTL defeats TTL=0 rebinding ──
    # Any response with a shorter TTL is pinned to 60 s. Most legitimate
    # records have multi-minute TTLs already; the floor only affects the
    # malicious case of an attacker controlling DNS for an allowlisted
    # domain and rotating answers per query.
    cache-min-ttl: 60
    cache-max-ttl: 3600

    # Reject responses that point at private space (belt-and-suspenders
    # with the nftables drop). An allowlisted hostname whose DNS returns
    # 127.0.0.1 / RFC1918 / link-local will simply not resolve here.
    private-address: 0.0.0.0/8
    private-address: 10.0.0.0/8
    private-address: 100.64.0.0/10
    private-address: 127.0.0.0/8
    private-address: 169.254.0.0/16
    private-address: 172.16.0.0/12
    private-address: 192.0.0.0/24
    private-address: 192.168.0.0/16
    private-address: 198.18.0.0/15
    private-address: 224.0.0.0/4
    private-address: 240.0.0.0/4
    private-address: ::1/128
    private-address: fc00::/7
    private-address: fe80::/10
    private-address: ff00::/8

    # Don't serve stale data after a cache miss — better to fail than
    # silently return a record from before the rebinding window closed.
    serve-expired: no

    # Resource limits — single-user perimeter, low query rate
    num-threads: 1
    msg-cache-size: 4m
    rrset-cache-size: 8m

    chroot: ""                  # tmpfs root; no chroot
    username: "nobody"
    pidfile: ""                 # PID 1 lifecycle == process lifecycle

# ── Trusted upstreams (DoT) ──
# Forward all queries upstream over TLS. Pinned to Quad9 + Cloudflare.
# tls-cert-bundle pins the system CA store explicitly (Alpine path differs
# from Debian/Red Hat defaults; unbound's compile-time default may not match).
server:
    tls-cert-bundle: "/etc/ssl/certs/ca-certificates.crt"

forward-zone:
    name: "."
    forward-tls-upstream: yes

    # Quad9 — primary; malware-blocking secure resolver
    forward-addr: 9.9.9.9@853#dns.quad9.net
    forward-addr: 149.112.112.112@853#dns.quad9.net

    # Cloudflare — secondary
    forward-addr: 1.1.1.1@853#cloudflare-dns.com
    forward-addr: 1.0.0.1@853#cloudflare-dns.com

remote-control:
    control-enable: no
