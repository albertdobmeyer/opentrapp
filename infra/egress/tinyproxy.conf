# vault-egress tinyproxy configuration — ADR-0009 Tier 4 (L7 forwarder)
#
# tinyproxy acts as the explicit upstream HTTP/HTTPS CONNECT proxy that
# vault-proxy chains to via `mitmdump --mode upstream:http://vault-egress:8888`.
# It is a thin pass-through: the L7 allowlist + DNS-rebinding check live in
# vault-proxy; the L3 destination-IP drop lives in the nftables ruleset below
# this process. tinyproxy's role is purely to terminate the CONNECT method
# from vault-proxy and open the upstream TCP socket — at which point the
# kernel filter applies.

User nobody
Group nobody

# Only reachable from egress-net per compose network policy.
Port 8888
Listen 0.0.0.0

Timeout 600
DefaultErrorFile "/dev/null"

# Don't add Via header to upstream — vault-proxy already added its own and
# we don't want to leak vault-egress as an intermediate hop.
DisableViaHeader Yes

# CONNECT method must be allowed for HTTPS tunneling. Restrict to the
# standard HTTPS port; HTTP/80 also allowed because some allowlisted hosts
# serve plain HTTP for liveness checks.
ConnectPort 443
ConnectPort 80

# Without LogFile, tinyproxy logs to stderr — which podman compose forwards
# to `podman logs vault-egress`. Avoids the "/dev/stdout changed before it
# could be opened" race against podman's stdout setup.
LogLevel Info

# Tight client limits — only a handful of containers connect to us.
# Min/MaxSpareServers + StartServers were removed in newer tinyproxy releases;
# MaxClients is now the single concurrency knob.
MaxClients 32
