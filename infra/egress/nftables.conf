# vault-egress nftables ruleset — ADR-0009 Tier 4 (kernel-level RFC1918 drop)
#
# Purpose: block any outbound packet whose destination address falls in
# private, loopback, link-local, multicast, or reserved space. This is the
# L3 belt-and-suspenders layer behind vault-proxy's L7 destination-IP check.
#
# Loaded by entrypoint.sh:  nft -f /opt/vault/nftables.conf
# Verified by healthcheck:  nft list ruleset | grep vault_egress_drop_private
#
# Why a chain rather than a table: keeps the ruleset small and easily
# inspectable. The OpenSSF / SignPath reviewer reading this file should
# be able to verify the policy in 30 seconds.

flush ruleset

table inet vault_egress {
    # IPv4 private/loopback/link-local/multicast/reserved
    set vault_egress_drop_private_v4 {
        type ipv4_addr
        flags interval
        elements = {
            0.0.0.0/8,        # "This network"
            10.0.0.0/8,       # RFC1918
            100.64.0.0/10,    # Carrier-grade NAT (RFC6598)
            127.0.0.0/8,      # Loopback
            169.254.0.0/16,   # Link-local + cloud-metadata (169.254.169.254)
            172.16.0.0/12,    # RFC1918 (covers default podman/docker bridge)
            192.0.0.0/24,     # IETF protocol assignments
            192.168.0.0/16,   # RFC1918
            198.18.0.0/15,    # Benchmarking
            224.0.0.0/4,      # Multicast
            240.0.0.0/4       # Reserved for future use
        }
    }

    # IPv6 loopback/ULA/link-local/multicast
    set vault_egress_drop_private_v6 {
        type ipv6_addr
        flags interval
        elements = {
            ::1/128,          # IPv6 loopback
            ::/128,           # Unspecified
            fc00::/7,         # Unique local addresses
            fe80::/10,        # Link-local
            ff00::/8          # Multicast
        }
    }

    # Forward chain: packets vault-proxy and other internal containers send
    # through us bound for the public internet. Drop anything destined for
    # private space; allow the rest. The L4/L7 layers above made the policy
    # decision; this chain enforces it at the kernel level.
    chain forward {
        type filter hook forward priority 0; policy drop;

        # Established/related return traffic always allowed
        ct state established,related accept

        # Drop private destinations regardless of source interface
        ip  daddr @vault_egress_drop_private_v4 drop comment "vault-egress L3 drop v4 private"
        ip6 daddr @vault_egress_drop_private_v6 drop comment "vault-egress L3 drop v6 private"

        # Allow new connections to public destinations
        ct state new accept
    }

    # Output chain: covers any packet vault-egress itself originates
    # (e.g. the DoH resolver in doh-resolver.py reaching out to Cloudflare /
    # Quad9). Same private-destination drop applied here as a second
    # enforcement point.
    chain output {
        type filter hook output priority 0; policy accept;

        ct state established,related accept
        oif "lo" accept

        # Drop egress to private space EXCEPT to vault-egress's own egress-net
        # interfaces (the upstream-side interface that vault-proxy reaches us on).
        # The egress-net subnet is itself private; carve it out.
        # NOTE: the subnet is declared in compose.yml — keep these in sync.
        ip  daddr 10.230.0.0/24 accept comment "egress-net carve-out (compose.yml)"

        ip  daddr @vault_egress_drop_private_v4 drop comment "vault-egress L3 drop v4 private (output)"
        ip6 daddr @vault_egress_drop_private_v6 drop comment "vault-egress L3 drop v6 private (output)"
    }

    # Postrouting NAT: SNAT-MASQUERADE outbound traffic on the external-net
    # interface so return traffic finds its way back. The kernel forward
    # chain has already dropped anything destined for private space.
    chain postrouting {
        type nat hook postrouting priority 100;

        # MASQUERADE on whatever interface routes to the default GW.
        # In compose, external-net is the bridge with the host gateway;
        # we identify it by the IP range NOT being our egress-net subnet.
        ip  saddr 10.230.0.0/24 oifname != "lo" masquerade
    }
}
