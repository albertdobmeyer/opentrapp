# Lobster-TrApp: Orchestrator Workflows
#
# Cross-component sequences that span multiple components.
# These are NOT in any single component.yml — they live here because
# they express relationships between components.
#
# The GUI and Claude Code execute these as single user-facing actions.
# Each step references a component ID + command ID or workflow ID.

workflows:
  # ─── Install a Skill Safely ────────────────────────────────────
  # The flagship cross-component workflow: forge scans a skill
  # inside the perimeter and delivers the certified result to the
  # agent's workspace via the write-only forge-deliveries volume.
  # The agent picks up new artefacts on its next reload — no
  # separate "install" step is needed at the orchestrator layer.
  - id: install-skill
    name: Install a Skill
    user_description: >
      Downloads a skill, scans it for security threats inside a
      secure sandbox, rebuilds it from scratch to remove any hidden
      content, and delivers the clean version to your assistant.
    danger: caution
    shell_requirement: split
    steps:
      - id: scan-skill
        component: clawhub-forge
        command: scan
        args:
          skill_name: "{{input.skill_name}}"
        abort_on_failure: true
    inputs:
      - id: skill_name
        type: string
        label: Skill name
        description: Name of the skill to install from ClawHub

  # ─── First-Time Setup ──────────────────────────────────────────
  # The complete setup flow for a new user: prepare the vault,
  # set up forge for skill scanning, and (when un-parked) prepare
  # pioneer's social-content scanner.
  - id: first-run-setup
    name: Set Up Your Assistant
    user_description: >
      Sets up the secure environment for your AI assistant.
      Builds the containment system, starts all security layers,
      and verifies everything is locked down properly.
    danger: caution
    steps:
      - id: vault-setup
        component: openclaw-vault
        command: setup
        abort_on_failure: true
      - id: forge-setup
        component: clawhub-forge
        command: setup
        depends_on: vault-setup
      - id: pioneer-setup
        component: moltbook-pioneer
        command: setup
        depends_on: vault-setup
    inputs: []

  # ─── Full Security Audit ───────────────────────────────────────
  # Run verification across all components simultaneously. Pioneer's
  # identity-check is the safety-relevant probe available while the
  # component remains parked (see ADR-0004); it does not exercise
  # the dormant feed-scanner pipeline.
  - id: full-audit
    name: Security Audit
    user_description: >
      Runs a complete security check across the entire system —
      container isolation, skill scanner health, and identity
      readiness for the social-content layer.
    danger: safe
    steps:
      - id: vault-verify
        component: openclaw-vault
        command: verify
      - id: forge-verify
        component: clawhub-forge
        command: verify-all
      - id: pioneer-verify
        component: moltbook-pioneer
        command: identity-check

# ─── Enable Feed Monitoring (REMOVED 2026-05-04) ────────────────
# The previous "enable-feeds" workflow referenced two pioneer
# workflows (export-patterns and safety-check) that no longer
# exist; pioneer's manifest exposes only commands now, and the
# component itself is parked (see docs/adr/0004-parking-moltbook-pioneer.md).
# When pioneer is un-parked, the workflow should be re-introduced
# here referencing whatever the un-parked manifest exposes.
