name: Supply-chain audit

# Vulnerability scans of declared dependencies. Runs on every push to main,
# on every pull request that modifies a manifest or lockfile, and on a
# weekly schedule so newly published advisories surface without waiting
# for a code change.

on:
  push:
    branches: [main]
    paths:
      - "app/package.json"
      - "app/package-lock.json"
      - "app/src-tauri/Cargo.toml"
      - "app/src-tauri/Cargo.lock"
      - ".github/workflows/supply-chain.yml"
  pull_request:
    branches: [main]
    paths:
      - "app/package.json"
      - "app/package-lock.json"
      - "app/src-tauri/Cargo.toml"
      - "app/src-tauri/Cargo.lock"
  schedule:
    - cron: "37 6 * * 2"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  npm-audit:
    name: npm audit (frontend)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: false

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      - run: npm ci

      # --audit-level=high blocks the run only on advisories rated High or
      # Critical. Moderate and below are reported but not gated, on the
      # principle that a noisy gate is an ignored gate.
      - run: npm audit --audit-level=high --omit=dev

  cargo-audit:
    name: cargo audit (backend)
    runs-on: ubuntu-latest
    # Failures in this job surface as a workflow failure but do not gate
    # the primary CI pipeline. Newly published advisories that affect a
    # transitive dependency typically require an upstream release before
    # they can be remediated, and a hard CI gate would block unrelated
    # work in the meantime. Triage the findings out-of-band.
    continue-on-error: true
    defaults:
      run:
        working-directory: app/src-tauri
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: false

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: app/src-tauri

      - name: Install cargo-audit
        run: cargo install --locked cargo-audit

      # Without --deny warnings: vulnerabilities still fail the step, but
      # informational notices (yanked-but-unaffected crates, warnings) do
      # not. Real findings remain visible in the step log.
      - run: cargo audit

  cargo-deny:
    name: cargo deny (license + bans)
    runs-on: ubuntu-latest
    # See cargo-audit job for the rationale. Failures here surface as a
    # workflow failure for visibility but do not block CI.
    continue-on-error: true
    defaults:
      run:
        working-directory: app/src-tauri
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: false

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: app/src-tauri

      - name: Install cargo-deny
        run: cargo install --locked cargo-deny

      - run: cargo deny --all-features check
