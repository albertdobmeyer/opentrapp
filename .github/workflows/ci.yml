name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      release:
        description: 'Create a release'
        type: boolean
        default: false

# Read-only by default. Jobs that need write access (build-images: ghcr push +
# cosign signing) declare it explicitly at the job level. Principle of least
# privilege. Post de-Tauri cutover there is no release-publishing job — packaging
# is deferred to cargo-dist (ADR-0023).
permissions:
  contents: read

jobs:
  check-frontend:
    name: Frontend (tsc + vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json

      - run: npm ci
      - run: npm run lint
      - run: npx tsc --noEmit
      - run: npm test

  check-rust:
    name: Rust (check + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app/src-tauri
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: app/src-tauri

      # Post de-Tauri cutover (ADR-0022): no GTK/WebKit system deps and no sidecar
      # staging — the workspace (core + daemon + viewer-server) is pure-Rust /
      # rustls, headless, and builds with the runner's stock toolchain.
      - run: cargo check --workspace
      - run: cargo test --workspace

      # ADR-0019/0022 verification #1: the de-Tauri spine must not link tauri/wry/
      # webkit, directly or transitively. RAM numbers are meaningless if WebKit
      # is still in the binary, and the whole point of the loopback viewer-server
      # (ADR-0022, T8) is that it replaces the bundled webview — so it must be
      # gtk-free too. This is the load-bearing gate for Phase B + de-Tauri step 2.
      - name: De-Tauri spine dependency graphs are WebKit-free
        run: |
          # Strip the ` (path)` annotation first — otherwise the `src-tauri` in
          # the crate's own path is a false positive. We match dependency NAMES,
          # not filesystem paths.
          for crate in opentrapp-daemon viewer-server; do
            if cargo tree -p "$crate" -e normal | sed -E 's/ \([^)]*\)//' | grep -iE 'tauri|wry|webkit'; then
              echo "::error::$crate pulled in tauri/wry/webkit — the de-Tauri spine must stay headless"
              exit 1
            fi
            echo "$crate dependency graph is WebKit-free ✓"
          done

  check-goproxy:
    name: goproxy vault-proxy (go test)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          # Track the pinned toolchain in go.mod (currently 1.25.11) so this
          # never drifts behind a security-driven Go bump (known-advisories.md).
          go-version-file: infra/proxy/goproxy/go.mod
          cache-dependency-path: infra/proxy/goproxy/go.sum
      # The L7 egress chokepoint (ADR-0026): the policy contract pins + the
      # handler/CA pins. The credential-injection path must stay correct.
      - name: go test (policy + handler/CA pins)
        working-directory: infra/proxy/goproxy
        run: go test ./...
      - name: go vet
        working-directory: infra/proxy/goproxy
        run: go vet ./...
      # vault-proxy is Tier-2 (release-gating): a reachable advisory here is a
      # real breach path. Fail the build on any source-reachable vuln so the
      # toolchain pin can never silently rot (known-advisories.md).
      - name: govulncheck (reachable advisories only)
        working-directory: infra/proxy/goproxy
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          "$(go env GOPATH)/bin/govulncheck" ./...

  check-orchestration:
    name: Orchestration (42 checks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - run: pip install --require-hashes -r tests/requirements.txt

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install frontend deps (for package.json validation)
        working-directory: app
        run: npm ci

      - run: bash tests/orchestrator-check.sh

  integration-tests:
    name: Integration tests (cross-module contracts)
    needs: check-orchestration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - run: pip install --require-hashes -r tests/requirements.txt

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - run: bash tests/integration-test.sh --ci

  smoke-test:
    name: Playwright smoke tests
    needs: check-frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json

      - run: npm ci
      - run: npx playwright install chromium --with-deps
      # --project=default excludes the `demo` project (e2e/demo-*.spec.ts),
      # which exists only to record docs gifs via `npm run demo:record`.
      - run: npx playwright test --project=default

  # ── Perimeter images (tag builds only) ─────────────────────────────────
  # Builds the five OpenTrApp container images in CI — never on the user's
  # machine — then signs each (cosign keyless), pushes to GHCR by digest,
  # exports an OCI tarball uploaded as a durable release asset (the daemon
  # downloads + digest-pins it on first run, ADR-0011), and emits a signed
  # `image-digests.json` overlay that the runtime verifies before `podman run`.
  # This is the supply-chain backbone of the zero-trust bootstrap (ADR-0009).
  # All five perimeter images are now first-party built + signed (WS-C switched
  # vault-proxy from upstream mitmproxy to the goproxy build, ADR-0026).
  build-images:
    name: Build perimeter images
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [check-rust, check-orchestration]
    runs-on: ubuntu-22.04
    permissions:
      contents: write           # upload the signed tarballs + overlay to the draft release
      packages: write           # push to GHCR
      id-token: write           # cosign keyless (sigstore OIDC)
      attestations: write       # SLSA build-provenance
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac # v3

      - name: Build, push (by digest), sign, and export each image
        id: images
        shell: bash
        run: |
          set -euo pipefail
          OWNER="$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          REG="ghcr.io/${OWNER}/opentrapp"
          TAG="${GITHUB_REF_NAME}"
          echo "${{ secrets.GITHUB_TOKEN }}" | podman login ghcr.io -u '${{ github.actor }}' --password-stdin
          # cosign uses its own keychain (~/.docker/config.json), NOT podman's
          # auth store — it must be logged in separately or the signature-blob
          # upload to GHCR fails with UNAUTHORIZED.
          echo "${{ secrets.GITHUB_TOKEN }}" | cosign login ghcr.io -u '${{ github.actor }}' --password-stdin
          mkdir -p images

          # service → build context (Containerfile lives in each context dir)
          declare -A CTX=(
            [vault-agent]=workloads/agent
            [vault-egress]=infra/egress
            [vault-skills]=workloads/skills
            [vault-social]=workloads/social
            [vault-proxy]=infra/proxy/goproxy
          )

          # Begin the signed digest overlay the runtime verifies against.
          {
            echo '{'
            echo '  "version": 1,'
            echo "  \"tag\": \"${TAG}\","
            echo "  \"repo\": \"${{ github.repository }}\","
            echo "  \"signer_identity_regexp\": \"https://github.com/${{ github.repository }}/.github/workflows/ci.yml@refs/tags/.*\","
            echo "  \"oidc_issuer\": \"https://token.actions.githubusercontent.com\","
            echo '  "images": {'
          } > images/image-digests.json

          first=1
          for svc in vault-agent vault-egress vault-skills vault-social vault-proxy; do
            ctx="${CTX[$svc]}"
            img="${REG}/${svc}"
            echo "::group::build ${svc}"
            podman build -t "${img}:${TAG}" -f "${ctx}/Containerfile" "${ctx}"
            # Push and capture the registry digest.
            podman push --digestfile="images/${svc}.digest" "${img}:${TAG}"
            digest="$(cat images/${svc}.digest)"
            echo "${svc} → ${img}@${digest}"
            # Sign the image by digest (keyless). Verified at runtime against
            # signer_identity_regexp + oidc_issuer above.
            cosign sign --yes "${img}@${digest}"
            # Export the image as an OCI archive for bundling. Save by TAG —
            # podman's local store resolves the tag, not the registry push
            # digest (which would error "image not known"). The saved manifest
            # is the same content, so a runtime `podman load` reproduces the
            # digest recorded in the overlay.
            podman save --format oci-archive -o "images/${svc}.tar" "${img}:${TAG}"
            # Append to the overlay.
            [ $first -eq 1 ] || echo ',' >> images/image-digests.json
            first=0
            printf '    "%s": { "digest": "%s", "source": "built", "tar": "%s.tar" }' "${img}" "${digest}" "${svc}" >> images/image-digests.json
            echo "::endgroup::"
          done

          echo '  }' >> images/image-digests.json
          echo '}' >> images/image-digests.json
          cat images/image-digests.json
          rm -f images/*.digest

      - name: Attest provenance for the bundled image tarballs
        uses: actions/attest-build-provenance@ef244123eb79f2f7a7e75d99086184180e6d0018 # v1
        with:
          subject-path: 'images/*.tar'

      # Attach the signed image tarballs + the digest overlay as DURABLE release
      # assets (not a 1-day artifact). The daemon's fetch_perimeter_images()
      # downloads these from the release URL on first run and digest-pins them
      # via BundleVerifier (ADR-0011, closes #76). The cargo-dist `release.yml`
      # workflow owns release creation (as a --draft, with the announcement
      # notes); this job waits for that draft on the same tag, then uploads to it.
      - name: Publish signed perimeter images to the draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          # cargo-dist's host job creates the draft AFTER its build matrix, so it
          # may appear minutes after this job's images are built. Wait up to 30m.
          for i in $(seq 1 180); do
            if gh release view "$TAG" >/dev/null 2>&1; then break; fi
            echo "waiting for the draft release $TAG (cargo-dist release.yml) — ${i}/180"
            sleep 10
          done
          if ! gh release view "$TAG" >/dev/null 2>&1; then
            echo "::error::draft release $TAG never appeared — cargo-dist release.yml must run on the same tag. Images are built+signed; upload them manually: gh release upload $TAG images/*.tar images/image-digests.json"
            exit 1
          fi
          # --clobber keeps re-runs idempotent.
          gh release upload "$TAG" images/*.tar images/image-digests.json --clobber
          echo "attached $(ls images/*.tar | wc -l) image tarballs + image-digests.json to $TAG"

  build-release-binaries:
    name: Build headless binaries (release smoke)
    # Post de-Tauri cutover (ADR-0022): the product is the headless opentrapp-daemon
    # + the on-demand viewer-server — no Tauri installers. Cross-platform RELEASE
    # PACKAGING (signed per-OS artifacts) is deferred to cargo-dist (ADR-0023),
    # wired in a follow-up. This job proves the shipped binaries + the frontend
    # build on main and stay GTK/WebKit-free; it does not publish a release.
    if: >-
      !cancelled() &&
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch') &&
      needs.check-frontend.result == 'success' &&
      needs.check-rust.result == 'success' &&
      needs.check-orchestration.result == 'success' &&
      needs.integration-tests.result == 'success'
    needs: [check-frontend, check-rust, check-orchestration, integration-tests]
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: app/src-tauri

      - name: Build the headless release binaries (daemon + viewer-server)
        working-directory: app/src-tauri
        run: cargo build --release -p opentrapp-daemon -p viewer-server

      - name: Build the frontend (served by the viewer-server)
        working-directory: app
        run: |
          npm ci
          npm run build

      - name: Confirm the shipped binaries are GTK/WebKit-free (cutover guard)
        working-directory: app/src-tauri
        run: |
          for crate in opentrapp-daemon viewer-server; do
            if cargo tree -p "$crate" -e normal | sed -E 's/ \([^)]*\)//' | grep -iE 'tauri|wry|webkit|gtk'; then
              echo "::error::$crate links tauri/wry/webkit/gtk — the de-Tauri cutover regressed"; exit 1
            fi
            echo "$crate is GTK/WebKit-free ✓"
          done
