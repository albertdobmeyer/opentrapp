name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      release:
        description: 'Create a release'
        type: boolean
        default: false

# Read-only by default. Jobs that need write access (build-and-release)
# declare it explicitly at the job level. Principle of least privilege.
permissions:
  contents: read

jobs:
  check-frontend:
    name: Frontend (tsc + vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: true

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm test

  check-rust:
    name: Rust (check + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app/src-tauri
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: true

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: app/src-tauri

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libgtk-3-dev

      - run: cargo check
      - run: cargo test

  check-orchestration:
    name: Orchestration (42 checks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: true

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - run: pip install --require-hashes -r tests/requirements.txt

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install frontend deps (for package.json validation)
        working-directory: app
        run: npm ci

      - run: bash tests/orchestrator-check.sh

  integration-tests:
    name: Integration tests (cross-module contracts)
    needs: check-orchestration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: true

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - run: pip install --require-hashes -r tests/requirements.txt

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - run: bash tests/integration-test.sh --ci

  smoke-test:
    name: Playwright smoke tests
    needs: check-frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: true

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      - run: npm ci
      - run: npx playwright install chromium --with-deps
      - run: npx playwright test

  build-and-release:
    name: Build (${{ matrix.platform.name }})
    if: github.event_name == 'push'  || github.event_name == 'workflow_dispatch'
    needs: [check-frontend, check-rust, check-orchestration, integration-tests]
    permissions:
      contents: write
      id-token: write           # required for cosign keyless signing (sigstore OIDC)
      attestations: write       # required for build-provenance attestation
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: Linux x64
            slug: linux-x64
            runner: ubuntu-22.04
            args: ''
          - name: macOS ARM
            slug: macos-arm
            runner: macos-latest
            args: '--target aarch64-apple-darwin'
          - name: macOS Intel
            slug: macos-intel
            runner: macos-latest
            args: '--target x86_64-apple-darwin'
          - name: Windows x64
            slug: windows-x64
            runner: windows-latest
            args: ''
    runs-on: ${{ matrix.platform.runner }}
    outputs:
      release_id: ${{ steps.tauri.outputs.releaseId }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: true

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: ${{ matrix.platform.runner == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: app/src-tauri

      - name: Install system dependencies (Linux)
        if: matrix.platform.runner == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libgtk-3-dev

      - name: Install frontend dependencies
        working-directory: app
        run: npm ci

      - name: Build and release
        id: tauri
        uses: tauri-apps/tauri-action@84b9d35b5fc46c1e45415bdb6144030364f7ebc5 # v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: app
          args: ${{ matrix.platform.args }}
          tagName: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || '' }}
          releaseName: ${{ startsWith(github.ref, 'refs/tags/v') && format('Lobster-TrApp {0}', github.ref_name) || '' }}
          releaseBody: 'See the assets below to download and install.'
          releaseDraft: true
          prerelease: false
          includeUpdaterJson: true

      # ── Supply-chain provenance (release tags only) ────────────────────────
      # The four steps below run only on tag pushes and produce, per built
      # artefact: a CycloneDX SBOM, a cosign keyless signature (sigstore), and
      # a SLSA Build Level 2 build-provenance attestation. Outputs are
      # uploaded as workflow artefacts; the release-bundle job below collects
      # them into the GitHub Release as downloadable assets.

      - name: Locate built artefacts
        if: startsWith(github.ref, 'refs/tags/v')
        id: artefacts
        shell: bash
        run: |
          # Tauri writes the bundle to .../release/bundle/<format>/. The
          # earlier version of this step found every *.exe under target/,
          # which on Windows swept in ~80 Cargo build-script intermediate
          # binaries (build_script_build-XXXXX.exe). Constraining the find
          # to */release/bundle/* keeps only the user-facing release artefacts.
          set -euo pipefail
          mkdir -p artefacts
          find app/src-tauri/target -type f -path "*/release/bundle/*" \
            \( -name "*.deb" -o -name "*.rpm" -o -name "*.AppImage" \
               -o -name "*.dmg" -o -name "*.msi" -o -name "*.exe" \
               -o -name "*.app.tar.gz" \) \
            -exec cp {} artefacts/ \; || true
          ls -la artefacts/
          echo "dir=artefacts" >> "$GITHUB_OUTPUT"

      - name: Generate CycloneDX SBOM (syft)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          path: .
          format: cyclonedx-json
          # Use the platform's slug (no spaces) for the filename; matrix.platform.name
          # contains a space (e.g. "Linux x64") which broke the unquoted `for f in $(ls)`
          # downstream in the cosign sign-blob step on the v0.3.2 build.
          output-file: artefacts/sbom-${{ matrix.platform.slug }}.cyclonedx.json
          upload-artifact: false
          upload-release-assets: true

      - name: Sign artefacts with cosign (keyless / sigstore)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac # v3
      - name: Run cosign sign-blob
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          cd artefacts
          # Glob expansion handles spaces correctly; `for f in $(ls)` does not.
          for f in *; do
            [ -f "$f" ] || continue
            # Skip files we ourselves are about to produce.
            case "$f" in
              *.sig|*.pem) continue ;;
            esac
            cosign sign-blob --yes \
              --output-signature "${f}.sig" \
              --output-certificate "${f}.pem" \
              "$f"
          done

      - name: Generate SLSA build-provenance attestation
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/attest-build-provenance@ef244123eb79f2f7a7e75d99086184180e6d0018 # v1
        with:
          subject-path: artefacts/*

      - name: Attach SBOM, signatures, and attestation to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          tag_name: ${{ github.ref_name }}
          draft: true
          files: |
            artefacts/sbom-*.cyclonedx.json
            artefacts/*.sig
            artefacts/*.pem
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
