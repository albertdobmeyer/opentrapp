name: CodeQL

# Static analysis via GitHub's CodeQL engine. Runs on every push to main, on
# every pull request, and on a weekly schedule so newly published query
# packs surface old issues without waiting for a code change.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Tuesdays at 06:23 UTC. Off-peak relative to the rest of the workflow set.
    - cron: "23 6 * * 2"

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 360

    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - language: javascript-typescript
            build-mode: none
          - language: actions
            build-mode: none
          # CodeQL Rust support analyses sources without building, so it
          # uses build-mode: none. The "manual" mode is not supported for
          # Rust and produces a fatal extractor error.
          - language: rust
            build-mode: none

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: false

      - name: Initialize CodeQL
        uses: github/codeql-action/init@0daab03d71ff584ef619d027a3fd9146679c5d84 # v3
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          queries: security-extended,security-and-quality

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@0daab03d71ff584ef619d027a3fd9146679c5d84 # v3
        with:
          category: "/language:${{ matrix.language }}"
