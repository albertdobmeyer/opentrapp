name: CodeQL

# Static analysis via GitHub's CodeQL engine. Runs on every push to main, on
# every pull request, and on a weekly schedule so newly published query
# packs surface old issues without waiting for a code change.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Tuesdays at 06:23 UTC. Off-peak relative to the rest of the workflow set.
    - cron: "23 6 * * 2"

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 360

    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - language: javascript-typescript
            build-mode: none
          - language: actions
            build-mode: none
          - language: rust
            build-mode: manual

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          queries: security-extended,security-and-quality

      - name: Install Linux WebKit dependencies (Rust build)
        if: matrix.language == 'rust'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev

      - name: Build Rust crate
        if: matrix.language == 'rust'
        working-directory: app/src-tauri
        run: cargo build --release

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
