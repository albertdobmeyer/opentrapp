name: Publish crate (opentrapp-core)

# Publishes the reusable, tauri-free orchestration core to crates.io on a release
# tag. This is the recognized publish that flips the OpenSSF Scorecard "Packaging"
# check (its matcher recognizes a literal `cargo publish` run) — see ADR-0023.
#
# READY-TO-ACTIVATE: the real publish runs ONLY when the `CARGO_REGISTRY_TOKEN`
# repo secret is set. Until then every step is skipped, so tagging a release never
# fails on this workflow. To activate (maintainer, one time):
#   1. Reserve the `opentrapp-core` name on crates.io (publish once, or claim it).
#   2. Add the repo secret CARGO_REGISTRY_TOKEN (a crates.io API token).
#   3. The next `v*` tag publishes opentrapp-core and the Scorecard Packaging
#      check flips off "?" on the following scan.

on:
  push:
    tags: ["v*"]
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  publish-crate:
    name: cargo publish opentrapp-core → crates.io
    runs-on: ubuntu-latest
    steps:
      - name: Gate on CARGO_REGISTRY_TOKEN presence
        id: gate
        env:
          TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          if [ -n "$TOKEN" ]; then
            echo "go=true" >> "$GITHUB_OUTPUT"
          else
            echo "go=false" >> "$GITHUB_OUTPUT"
            echo "CARGO_REGISTRY_TOKEN not set — skipping crate publish (ready-to-activate; see workflow header)."
          fi

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        if: steps.gate.outputs.go == 'true'
        with:
          submodules: false

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        if: steps.gate.outputs.go == 'true'

      - name: cargo publish opentrapp-core
        if: steps.gate.outputs.go == 'true'
        working-directory: app/src-tauri
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish -p opentrapp-core
