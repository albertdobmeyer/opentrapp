name: DCO

# Enforces the Developer Certificate of Origin: every commit in a pull request
# must carry a `Signed-off-by:` trailer (added by `git commit -s`). Toward the
# CII Best-Practices Silver `dco` criterion. Self-contained (no third-party
# action) so it stays SHA-pin clean. See the DCO section of CONTRIBUTING.md.

on:
  pull_request:

permissions:
  contents: read

jobs:
  dco:
    name: DCO sign-off check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}
      - name: Verify every commit is signed off
        env:
          BASE: ${{ github.event.pull_request.base.sha }}
          HEAD: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          missing=0
          # Non-merge commits introduced by this PR.
          while read -r sha; do
            [ -n "$sha" ] || continue
            if ! git show -s --format='%B' "$sha" | grep -qE '^Signed-off-by: .+ <.+@.+>$'; then
              subj=$(git show -s --format='%s' "$sha")
              echo "::error::commit ${sha:0:8} is missing a DCO sign-off — \"$subj\""
              missing=1
            fi
          done < <(git rev-list --no-merges "${BASE}..${HEAD}")
          if [ "$missing" -ne 0 ]; then
            echo ""
            echo "Sign off your commits with the Developer Certificate of Origin:"
            echo "  • new commit:        git commit -s"
            echo "  • fix the last one:  git commit --amend -s --no-edit && git push --force-with-lease"
            echo "  • fix a whole PR:    git rebase --signoff origin/main && git push --force-with-lease"
            echo "See the 'Developer Certificate of Origin (DCO)' section of CONTRIBUTING.md."
            exit 1
          fi
          echo "All commits carry a DCO sign-off."
