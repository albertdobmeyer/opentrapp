name: Skill Firewall (self-scan)

# Dogfoods the reusable Skill Firewall action (actions/skill-scan) against this repo's
# own published skills. It both verifies the action end-to-end in real CI (the only place
# a GitHub Action can be exercised) and serves as the canonical usage example. The 25
# published skills are clean, so this is expected to pass; a malicious skill would fail it.

on:
  pull_request:
    paths:
      - 'workloads/skills/**'
      - 'actions/skill-scan/**'
      - '.github/workflows/skill-firewall.yml'
  push:
    branches: [main]
    paths:
      - 'workloads/skills/**'
      - 'actions/skill-scan/**'

permissions:
  contents: read
  security-events: write   # upload SARIF findings to the Security tab

jobs:
  self-scan:
    name: Scan our own skills with the Skill Firewall
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: OpenTrApp Skill Firewall
        uses: ./actions/skill-scan
        with:
          path: workloads/skills/skills
          strict: false
