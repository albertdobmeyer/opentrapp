name: Fuzz

# Smoke-fuzz the orchestrator's two untrusted-input boundaries on every
# push and pull request. The harness sources are at app/src-tauri/fuzz/.
# Each target gets a 60-second budget per run — long enough to surface
# trivially exploitable defects, short enough to keep PR feedback under
# five minutes. Continuous, longer-running fuzzing is a separate concern
# best handled by an out-of-band runner (e.g. ClusterFuzzLite or a
# dedicated runner) and is not in scope for this workflow.

on:
  push:
    branches: [main]
    paths:
      - "app/src-tauri/src/**"
      - "app/src-tauri/fuzz/**"
      - "app/src-tauri/Cargo.toml"
      - "app/src-tauri/Cargo.lock"
      - ".github/workflows/fuzz.yml"
  pull_request:
    branches: [main]
    paths:
      - "app/src-tauri/src/**"
      - "app/src-tauri/fuzz/**"
      - "app/src-tauri/Cargo.toml"
      - "app/src-tauri/Cargo.lock"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  fuzz:
    name: Fuzz (${{ matrix.target }})
    runs-on: ubuntu-latest
    # Cold-cache builds compile the full Tauri stack with sancov+ASan
    # instrumentation, which takes ~8 minutes on a clean ubuntu-latest
    # runner. The 60-second fuzz run itself is bounded by -max_total_time.
    # Once Swatinem/rust-cache populates, subsequent runs land under 3 min.
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        target:
          - manifest_parse
          - runner_interpolate
          - redact_secrets
    defaults:
      run:
        working-directory: app/src-tauri/fuzz
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      # cargo-fuzz requires a nightly toolchain because it relies on
      # `-Zsanitizer` and other unstable rustc features. The previous
      # version of this workflow ran `cargo install cargo-fuzz --locked`
      # against the nightly toolchain, which broke when newer nightlies
      # rejected `rustix`'s use of internal `rustc_layout_scalar_valid_range_*`
      # attributes. Switching to a prebuilt cargo-fuzz via taiki-e/install-action
      # avoids the source-build entirely; the action verifies its own
      # signed releases, so the supply-chain posture is preserved.
      - name: Install nightly Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # action commit (sets toolchain via input below)
        with:
          toolchain: nightly

      - name: Install cargo-fuzz (prebuilt)
        uses: taiki-e/install-action@7ea35f098a7369cd23488403f58be9c491a6c55f # v2
        with:
          tool: cargo-fuzz

      - name: Install Linux WebKit dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev

      - name: Cache cargo registry
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: |
            app/src-tauri
            app/src-tauri/fuzz

      - name: Run ${{ matrix.target }} for 60 seconds
        run: |
          # Pin the target to gnu/glibc explicitly. cargo-fuzz on Linux
          # defaults to x86_64-unknown-linux-musl (static linking), which
          # is incompatible with the address sanitizer the harness needs:
          #   error: sanitizer is incompatible with statically linked libc,
          #          disable it using `-C target-feature=-crt-static`
          # The gnu target uses dynamic linking; ASan attaches cleanly.
          cargo +nightly fuzz run ${{ matrix.target }} \
            --target x86_64-unknown-linux-gnu -- \
            -max_total_time=60 \
            -timeout=10 \
            -rss_limit_mb=2048

      - name: Upload artefacts on failure
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: fuzz-artefacts-${{ matrix.target }}
          path: app/src-tauri/fuzz/artifacts/
          retention-days: 14
