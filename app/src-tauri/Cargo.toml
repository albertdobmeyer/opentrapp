[package]
name = "opentrapp"
version = "0.6.0"
edition = "2021"
description = "Containerization perimeter + skill scanner for autonomous CLI agents"
authors = ["Albert Dobmeyer"]
license = "MIT"
repository = "https://github.com/albertdobmeyer/opentrapp"
homepage = "https://github.com/albertdobmeyer/opentrapp#readme"

[dependencies]
tauri = { version = "2", features = ["tray-icon", "image-png"] }
tauri-plugin-single-instance = "2"
tauri-plugin-shell = "2"
tauri-plugin-store = "2"
tauri-plugin-updater = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
serde_yaml = "0.9"
tokio = { version = "1", features = ["full"] }
glob = "0.3"
regex = "1"
thiserror = "2"
tauri-plugin-notification = "2.3.3"
tauri-plugin-clipboard-manager = "2.3.2"
tauri-plugin-autostart = "2.5.1"
chrono = { version = "0.4", default-features = false, features = ["clock", "std"] }
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls"] }

[build-dependencies]
tauri-build = { version = "2", features = [] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
serde_yaml = "0.9"

[lib]
name = "opentrapp_lib"
crate-type = ["lib", "cdylib", "staticlib"]

[features]
# Exposes a thin public surface (`fuzz_api` module) over the manifest
# parser and command-argument interpolator. Enabled only by the fuzz
# crate at app/src-tauri/fuzz/. Production builds have the feature off
# and the internal modules remain private.
fuzzing = []
