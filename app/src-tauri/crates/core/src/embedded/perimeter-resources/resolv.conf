# vault-egress resolv.conf — pinned to local unbound resolver (ADR-0010 Tier 5)
#
# This file is mounted into the container at /etc/resolv.conf (read-only).
# All DNS queries from inside vault-egress route through 127.0.0.1:53, which
# is unbound forwarding over DNS-over-TLS to Quad9 + Cloudflare with a 60 s
# minimum-TTL cache (see unbound.conf for the policy).
#
# The host-side mount overrides podman's default per-network DNS plugin,
# which would otherwise write nameservers for the container's bridge IPs.
# unbound itself does not depend on /etc/resolv.conf — it talks directly to
# Quad9/Cloudflare by IP — so this redirection is safe even on first boot.

nameserver 127.0.0.1
options edns0 trust-ad
