# Configuration for `cargo deny`. The supply-chain workflow runs
# `cargo deny check` on every dependency change; this file is the policy.

[graph]
all-features = true

[advisories]
yanked = "warn"
ignore = []

[licenses]
# Permissive licenses compatible with the project's MIT license. Add new
# entries deliberately — license incompatibilities are easier to prevent
# than to remediate.
allow = [
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "BSL-1.0",
  "CC0-1.0",
  "ISC",
  "MIT",
  "MIT-0",
  "MPL-2.0",
  "OpenSSL",
  "Unicode-3.0",
  "Unicode-DFS-2016",
  "Unlicense",
  "Zlib",
]
confidence-threshold = 0.93

[bans]
multiple-versions = "warn"
wildcards = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
