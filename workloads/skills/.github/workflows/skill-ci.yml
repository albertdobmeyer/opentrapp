name: Skill CI

on:
  push:
    branches: [main]
    paths:
      - 'skills/**'
      - 'tools/**'
      - 'tests/**'
  pull_request:
    paths:
      - 'skills/**'
      - 'tools/**'
      - 'tests/**'

jobs:
  lint:
    name: Lint Skills
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run linter
        run: make lint

  scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Run security scanner
        run: make scan
      - name: Generate SARIF report
        if: always()
        run: make scan-sarif > results.sarif 2>/dev/null || true
      - name: Upload SARIF to GitHub
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results.sarif
        continue-on-error: true
      - name: Run scanner self-test
        run: make self-test

  test:
    name: Skill Tests
    runs-on: ubuntu-latest
    needs: [lint, scan]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install Python dependencies
        run: pip install pyyaml
      - name: Run tests
        run: make test
      - name: Verify test coverage
        run: |
          test_count=$(ls -1 tests/*.test.sh 2>/dev/null | wc -l)
          skill_count=$(ls -1d skills/*/SKILL.md 2>/dev/null | wc -l)
          echo "Tests: $test_count / Skills: $skill_count"
          if (( test_count < skill_count )); then
            echo "::warning::Test coverage incomplete: $test_count tests for $skill_count skills"
          fi

  tool-tests:
    name: Tool Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Run tool tests
        run: make test-tools
      - name: Run scanner self-test
        run: make self-test

