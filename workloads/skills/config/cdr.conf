# CDR Configuration — Content Disarm & Reconstruction
# Used by tools/lib/cdr-intent.sh

# Model for intent extraction. The small 1.5b is the default and is sufficient
# (parser failures are schema-detectable and retry-recoverable). Keep it small —
# CDR should never force a heavy download on a user who just wants the scanner.
CDR_MODEL="qwen2.5-coder:1.5b"

# Backend protocol: "ollama" (native /api/generate) or "openai" (any
# OpenAI-compatible /v1/chat/completions server). Use "openai" to point CDR at a
# model you ALREADY run — your agent's model, LM Studio, vLLM, a managed API, or
# even Ollama's own OpenAI-compatible endpoint — instead of a dedicated download.
CDR_API_FORMAT="ollama"

# Endpoint. For "ollama" use .../api/generate; for "openai" use
# .../v1/chat/completions. Can be a remote host — CDR does not require a LOCAL model.
#   ollama:  http://localhost:11434/api/generate
#   openai:  http://localhost:11434/v1/chat/completions   (or your own server)
CDR_ENDPOINT="http://localhost:11434/api/generate"

# Optional bearer token for the "openai" backend (left empty for local servers
# like Ollama/LM Studio that don't require auth).
CDR_API_KEY=""

# Maximum seconds to wait for the model response
CDR_TIMEOUT=120

# Maximum input lines (skills larger than this are rejected)
CDR_MAX_INPUT_LINES=2000
