[pytest]
asyncio_mode = auto
asyncio_default_fixture_loop_scope = session
asyncio_default_test_loop_scope = session
addopts = -ra --strict-markers --tb=short
markers =
    dogfood_tier_a: Tier A — happy path
    dogfood_tier_b: Tier B — adversarial
    dogfood_tier_c: Tier C — AssistantStatus state coverage
    dogfood_tier_d: Tier D — termination paths
    dogfood_full: full 27-scenario arc
